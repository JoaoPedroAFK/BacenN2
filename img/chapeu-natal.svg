<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Chapeuzinho de Natal -->
  <!-- Corpo vermelho do chapéu -->
  <path d="M 100 30 Q 60 30 40 80 Q 30 100 40 120 L 50 120 Q 45 105 55 95 Q 65 85 80 85 Q 95 85 105 95 Q 115 105 110 120 L 120 120 Q 130 100 120 80 Q 100 30 100 30 Z" 
        fill="#DC143C" 
        stroke="#B22222" 
        stroke-width="2"/>
  
  <!-- Borda branca (pompon) -->
  <ellipse cx="100" cy="120" rx="60" ry="15" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Pompon branco no topo -->
  <circle cx="100" cy="30" r="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Sombra no chapéu -->
  <path d="M 100 30 Q 60 30 40 80 Q 30 100 40 120 L 50 120 Q 45 105 55 95 Q 65 85 80 85" 
        fill="#B22222" 
        opacity="0.3"/>
  
  <!-- Brilho -->
  <ellipse cx="75" cy="60" rx="15" ry="25" fill="#FFFFFF" opacity="0.2"/>
</svg>

